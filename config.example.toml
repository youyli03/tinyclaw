# tinyclaw 配置模板
# 复制本文件到 ~/.tinyclaw/config.toml 并填入真实值
# 警告：config.toml 已加入 .gitignore，请勿提交真实密钥

# ── LLM 后端 ──────────────────────────────────────────────────────────────────
# 至少需要配置 daily（日常对话）
# code 和 summarizer 不配置时回退到 daily
#
# 支持两种后端类型：
#
# 1. OpenAI-compatible（显式指定 baseUrl + apiKey）：
#
#   [llm.backends.daily]
#   baseUrl = "https://api.openai.com/v1"
#   apiKey  = "sk-..."
#   model   = "gpt-4o"
#   # maxTokens = 4096    # 可选，默认 4096
#   # timeoutMs = 120000  # 可选，默认 120000ms
#
# 2. GitHub Copilot（自动发现模型和能力参数）：
#
#   [llm.backends.daily]
#   provider    = "copilot"
#   githubToken = "gh_cli"   # "gh_cli"=自动, "env"=$GITHUB_TOKEN, 或直接填 token
#   model       = "auto"     # "auto"=默认模型, 或填具体 model ID（如 "gpt-4o"）
#   # timeoutMs = 120000  # 可选，默认 120000ms
#
# Copilot 后端会从 https://api.githubcopilot.com/models 自动获取所有可用模型，
# 并将 max_output_tokens / max_context_window_tokens 等参数一一对应到 tinyclaw 配置。
# model = "auto" 时使用 Copilot 标记的 is_chat_default 模型。

[llm.backends.daily]
baseUrl = "https://api.openai.com/v1"
apiKey  = "sk-..."
model   = "gpt-4o"
# maxTokens = 4096    # 可选，默认 4096
# timeoutMs = 120000  # 可选，默认 120000ms

# ── code 后端（可选）──────────────────────────────────────────────────────────
# 供 /code 斜杠命令的 Code 模式使用，未配置时回退到 daily 后端
# 可配置更擅长代码的模型（如 o3-mini、claude-3-5-sonnet 等）
# [llm.backends.code]
# baseUrl = "https://api.openai.com/v1"
# apiKey  = "sk-..."
# model   = "o3-mini"
# # 使用 Copilot 示例：
# # provider    = "copilot"
# # githubToken = "gh_cli"
# # model       = "gpt-4.1"

# 使用 GitHub Copilot 账号示例（取消注释并删除上方 openai 配置）：
# [llm.backends.daily]
# provider    = "copilot"
# githubToken = "gh_cli"   # 需先运行 `gh auth login`
# model       = "auto"     # 自动选择 Copilot 的默认模型

[llm.backends.summarizer]
baseUrl = "https://api.openai.com/v1"
apiKey  = "sk-..."
model   = "gpt-4o-mini"

# ── Microsoft MFA ──────────────────────────────────────────────────────────────
# 用于高危操作（exec_shell / delete_file 等）的 number-matching 推送确认
# 注册步骤：
#   1. 访问 https://portal.azure.com → App registrations → New registration
#   2. 平台选 "Mobile and desktop applications"，Redirect URI 填 http://localhost
#   3. 复制 Application (client) ID 和 Directory (tenant) ID 填入下方

[auth.mfa]
tenantId    = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
clientId    = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
# timeoutSecs = 60   # 可选，默认 60 秒

# ── QQ Bot ─────────────────────────────────────────────────────────────────────
# 官方 QQ 开放平台 https://q.qq.com/ 申请机器人后获取

# ── 代码辅助工具 ───────────────────────────────────────────────────────────────
# code_assist 工具由 daily agent 调用，将代码任务委派给独立 AI 执行
# backend 可选：
#   "copilot" — 调用 copilot CLI（需安装）
#   "codex"   — 调用 codex CLI（需安装）
#   "api"     — 直接用 daily LLM API 一次无历史调用

[tools.code_assist]
backend        = "copilot"   # 底层执行方式
# model        = "gpt-5.1"  # 可选，透传 --model 给 CLI（api 模式忽略）
# maxCallsPerRun = 5         # 每次用户消息最多调用次数，0 = 不限制（默认 5）

# Code 模式工具调用轮次上限（默认 25，复杂代码任务建议保持较大值）
# chat 模式固定使用 10 轮，不受此项影响
# maxCodeToolRounds = 25

# 工具执行结果的最大字符数，超出时自动截断，防止大文件读取或冗长命令输出耗尽 context window
# 0 = 不限制（默认 20000）
# maxToolResultChars = 20000

[channels.qqbot]
appId        = "102xxxxx"
clientSecret = "your-client-secret"

# allowFrom = []                  # 空表示全部用户可私信，非空则白名单
# systemPrompt = ""               # 账户级系统提示词（追加在默认 prompt 后）
# imageServerBaseUrl = ""         # 图床公网地址，如 http://your-ip:18765（发图必填）
# markdownSupport = true          # 是否启用 markdown 消息格式
# imageServerPort = 18765         # 图床本地端口

# ── Agent 行为 ─────────────────────────────────────────────────────────────────
# heartbeatIntervalSecs：LLM 流式调用期间每隔多少秒推送"仍在处理中"消息，0 = 关闭
# [agent]
# heartbeatIntervalSecs = 120   # 默认 2 分钟，避免用户误以为 Agent 卡死

# ── 重试策略 ───────────────────────────────────────────────────────────────────
# 控制 LLM API 调用（流式 + 非流式）及 Copilot token/模型列表请求的重试行为。
# 所有字段均有默认值，通常无需修改，除非遇到严重的网络不稳定或需要降低 429 重试频率。
#
# [retry]
# maxAttempts         = 3      # 最多重试次数（不含首次尝试），默认 3
# baseDelayMs         = 1000   # 指数退避基准延迟（ms），实际带 ±10% 随机抖动，默认 1000
# retry429            = true   # 429 限流是否重试（等待建议时长后重试），默认 true
# retry5xx            = true   # 5xx 服务端错误是否重试，默认 true
# retryTransport      = true   # 传输层错误（ECONNRESET/socket 断开等）是否重试，默认 true
# retryTimeout        = false  # 请求超时是否重试，默认 false（超时通常意味着请求太大）
# streamIdleTimeoutMs = 30000  # 流式调用 chunk 间最长等待时间（ms），超时则中断并重试；0 = 禁用，默认 30000

# ── 向量记忆 ───────────────────────────────────────────────────────────────────
# embedModel 首次运行自动从 HuggingFace 下载
# 切换模型后需删除 ~/.tinyclaw/memory/index.sqlite 重新索引

[memory]
embedModel     = "hf:Qwen/Qwen3-Embedding-0.6B-GGUF/Qwen3-Embedding-0.6B-Q8_0.gguf"
tokenThreshold = 0.8    # 达到 contextWindow 的 80% 时触发摘要压缩
# contextWindow = 128000  # 可选，默认 128000
